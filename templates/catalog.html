{% extends 'home.html' %}

{% block content %}
<div class="catalog-page">
  <h3>Choose from below criteria</h3>
  <form method="POST" class="catalog-form">
    {{ form.hidden_tag() }}
    {% for field in form if field.widget.input_type != 'hidden' %}
      <p class="genre">{{ field }}</p>
    {% endfor %}
    <button type="submit" class="bttn">Select criteria</button>
  </form>
</div>
{% endblock %}
